name: checkout
label: Checkout
description: Checkout implementation
order: 20
options:
  - name: default
    label: Luma checkout
    default: true
  - name: hyva-checkout
    label: Hyvä Checkout
    requires:
      profileGroups:
        theme: hyva
    enables:
      addons: [hyva-checkout]
  - name: loki-checkout
    label: Loki Checkout
    variants:
      - name: hyva
        label: Hyvä variant
        default: true
        requires:
          profileGroups:
            theme: hyva
        enables:
          addons: [loki-checkout-hyva]
      - name: luma
        label: Luma variant
        preferAlternative:
          when:
            profileGroups:
              theme: hyva
          use: hyva
          reason: more performant on Hyvä
        enables:
          addons: [loki-checkout-luma]
        subtoggles:
          - name: luma-components
            label: Strip unused Luma JS
            description: Optional companion module
            addons: [loki-luma-components]
            default: true
